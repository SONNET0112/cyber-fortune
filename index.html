<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>粒子手势控制 — 握拳聚拢 · 张手散开</title>
<style>
  /* ========== 全局重置 ========== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    cursor: none; /* 隐藏默认鼠标，用粒子效果代替 */
  }

  /* ========== 粒子画布：铺满全屏 ========== */
  #particleCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  /* ========== 摄像头预览小窗 ========== */
  #cameraPreview {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 180px;
    height: 135px;
    border-radius: 16px;
    border: 2px solid rgba(0, 240, 255, 0.35);
    object-fit: cover;
    transform: scaleX(-1); /* 镜像翻转 */
    z-index: 10;
    opacity: 0.75;
    transition: all 0.4s;
    background: #0a0a0f;
    box-shadow: 0 0 20px rgba(0, 240, 255, 0.15), 0 0 60px rgba(179, 71, 234, 0.08);
  }

  #cameraPreview:hover {
    opacity: 1;
    border-color: rgba(0, 240, 255, 0.7);
    box-shadow: 0 0 30px rgba(0, 240, 255, 0.3), 0 0 80px rgba(179, 71, 234, 0.15);
  }

  /* 摄像头标签 */
  .cam-label {
    position: fixed;
    bottom: 164px;
    right: 24px;
    z-index: 11;
    color: rgba(0, 240, 255, 0.5);
    font-size: 0.7em;
    letter-spacing: 0.12em;
    font-weight: 600;
    pointer-events: none;
  }

  /* ========== 连接状态提示 ========== */
  #loadingOverlay {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    color: #888;
    font-size: 0.95em;
    letter-spacing: 0.1em;
    text-align: center;
    transition: opacity 0.5s;
  }
</style>
</head>
<body>

<!-- 粒子画布 -->
<canvas id="particleCanvas"></canvas>

<!-- 摄像头预览 -->
<video id="cameraPreview" autoplay playsinline></video>
<div class="cam-label">📷 CAM</div>

<div id="loadingOverlay">⏳ 加载手势识别模型…</div>

<!-- ==================== MediaPipe Hands CDN ==================== -->
<script type="module">
// ================================================================
//  引入 MediaPipe Tasks Vision 库（ESM 模块）
// ================================================================
import { HandLandmarker, FilesetResolver } from
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/+esm";

// ========================== 常量定义 ============================
const PARTICLE_COUNT = 600;           // 主粒子数（含连线后性能友好）
const BG_STAR_COUNT = 200;           // 背景星星数
const CONNECT_MAX_DIST = 130;        // 连线最大距离（像素）
const CONNECT_MAX_LINES = 8;         // 每个粒子最多连几条线
const LERP_SPEED = 0.05;             // 插值速度
const BASE_RING_RADIUS = 100;        // 聚拢圆环基础半径
const RING_THICKNESS = 90;           // 圆环厚度
const FLOAT_AMPLITUDE = 20;          // 漂浮振幅
const MOUSE_REPEL_RADIUS = 150;      // 鼠标排斥半径
const MOUSE_REPEL_FORCE = 40;        // 鼠标排斥力度
const SPATIAL_CELL = 140;            // 空间网格单元格大小（略大于连线距离）

// ========================== 全局变量 ============================
let canvas, ctx;
let particles = [];                  // 主粒子
let bgStars = [];                    // 背景星星
let video;
let handLandmarker;
let lastVideoTime = -1;
let isModelLoaded = false;

let currentGesture = 'none';
let gestureStable = 0;

let W, H;
let mouseX = -1000, mouseY = -1000;  // 鼠标位置
let mouseActive = false;              // 鼠标是否在窗口内
let time = 0;                         // 全局时间计数器

// 空间哈希表（用于高效连线查找）
let spatialGrid = new Map();

// 手势模式
let lastGestureMode = 'scatter';

// ========================== HSL 颜色工具 ============================

/** HSL → RGB 十六进制字符串 */
function hslToHex(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s = Math.max(0, Math.min(100, s)) / 100;
  l = Math.max(0, Math.min(100, l)) / 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => {
    const k = (n + h / 30) % 12;
    return l - a * Math.max(-1, Math.min(k - 3, Math.min(9 - k, 1)));
  };
  const r = Math.round(f(0) * 255);
  const g = Math.round(f(8) * 255);
  const b = Math.round(f(4) * 255);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

// ========================== 空间哈希表 ============================

function getCellKey(x, y) {
  const cx = Math.floor(x / SPATIAL_CELL);
  const cy = Math.floor(y / SPATIAL_CELL);
  return `${cx},${cy}`;
}

function clearSpatialGrid() {
  spatialGrid.clear();
}

function addToGrid(particle) {
  const key = getCellKey(particle.x, particle.y);
  if (!spatialGrid.has(key)) spatialGrid.set(key, []);
  spatialGrid.get(key).push(particle);
}

/** 查找粒子附近的所有邻居（只检查当前格 + 8 邻格） */
function getNearby(particle) {
  const cx = Math.floor(particle.x / SPATIAL_CELL);
  const cy = Math.floor(particle.y / SPATIAL_CELL);
  const nearby = [];
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      const key = `${cx + dx},${cy + dy}`;
      if (spatialGrid.has(key)) {
        nearby.push(...spatialGrid.get(key));
      }
    }
  }
  return nearby;
}

// ========================== 粒子类 ==============================
class Particle {
  constructor(id) {
    this.id = id;
    this.x = Math.random() * window.innerWidth;
    this.y = Math.random() * window.innerHeight;
    this.targetX = this.x;
    this.targetY = this.y;

    // —— 极坐标参数 ——
    this.angle = (id / PARTICLE_COUNT) * Math.PI * 2;
    this.orbitRadius = BASE_RING_RADIUS + (Math.random() - 0.5) * RING_THICKNESS;

    // —— 视觉 ——
    this.size = 0.6 + Math.random() * 2.8;
    this.baseSize = this.size;
    // 色相（0-360），每个粒子不同起始值
    this.hue = Math.random() * 360;
    this.hueSpeed = 0.03 + Math.random() * 0.12;  // 色相旋转速度
    this.alpha = 0.4 + Math.random() * 0.6;
    this.color = hslToHex(this.hue, 80, 60);

    // —— 动画 ——
    this.floatPhaseX = Math.random() * Math.PI * 2;
    this.floatPhaseY = Math.random() * Math.PI * 2;
    this.floatSpeedX = 0.003 + Math.random() * 0.008;
    this.floatSpeedY = 0.003 + Math.random() * 0.008;

    // —— 连线专用 ——
    this.connections = [];           // 本帧连接的邻居
    this.speed = 0;                 // 当前移动速度（用于动态特效）
    this.prevX = this.x;
    this.prevY = this.y;

    // —— 脉冲相位 ——
    this.pulsePhase = Math.random() * Math.PI * 2;
  }

  setTarget(mode, cx, cy) {
    if (mode === 'gather') {
      this.targetX = cx + this.orbitRadius * Math.cos(this.angle);
      this.targetY = cy + this.orbitRadius * Math.sin(this.angle);
      this.targetSize = this.baseSize * 1.5;
    } else {
      const margin = 40;
      this.targetX = margin + Math.random() * (W - margin * 2);
      this.targetY = margin + Math.random() * (H - margin * 2);
      this.targetSize = this.baseSize;
    }
    this.targetSize = this.targetSize || this.baseSize;
  }

  update() {
    // 记录旧位置用于计算速度
    this.prevX = this.x;
    this.prevY = this.y;

    // —— 线性插值向目标移动 ——
    this.x += (this.targetX - this.x) * LERP_SPEED;
    this.y += (this.targetY - this.y) * LERP_SPEED;

    // —— 鼠标排斥力（张手状态下更强） ——
    if (mouseActive) {
      const dx = this.x - mouseX;
      const dy = this.y - mouseY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < MOUSE_REPEL_RADIUS && dist > 0.1) {
        const force = (MOUSE_REPEL_RADIUS - dist) / MOUSE_REPEL_RADIUS;
        const repelScale = lastGestureMode === 'scatter' ? 1.5 : 0.4;
        this.x += (dx / dist) * MOUSE_REPEL_FORCE * force * repelScale;
        this.y += (dy / dist) * MOUSE_REPEL_FORCE * force * repelScale;
      }
    }

    // —— 漂浮微动 ——
    this.floatPhaseX += this.floatSpeedX;
    this.floatPhaseY += this.floatSpeedY;
    this.x += Math.sin(this.floatPhaseX) * FLOAT_AMPLITUDE * 0.25;
    this.y += Math.cos(this.floatPhaseY) * FLOAT_AMPLITUDE * 0.25;

    // —— 色相旋转 ——
    this.hue += this.hueSpeed;
    const saturation = 70 + Math.sin(time * 0.02 + this.id * 0.1) * 25;
    const lightness = 55 + Math.sin(time * 0.03 + this.id) * 20;
    this.color = hslToHex(this.hue, saturation, lightness);

    // —— 大小脉冲 ——
    this.pulsePhase += 0.03;
    this.pulseScale = 1 + Math.sin(this.pulsePhase) * 0.15;

    // —— 计算移动速度 ——
    this.speed = Math.sqrt(
      (this.x - this.prevX) ** 2 + (this.y - this.prevY) ** 2
    );
  }

  draw(ctx) {
    const s = Math.max(0.3, this.size * this.pulseScale);
    ctx.save();
    ctx.globalAlpha = this.alpha;

    // 最外层光晕（仅在粒子较大时绘制以节省性能）
    if (s > 1.5) {
      const glow3 = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s * 6);
      glow3.addColorStop(0, this.color);
      glow3.addColorStop(1, 'transparent');
      ctx.fillStyle = glow3;
      ctx.beginPath(); ctx.arc(this.x, this.y, s * 6, 0, Math.PI * 2); ctx.fill();
    }

    // 中层光晕
    const glow2 = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s * 3);
    glow2.addColorStop(0, this.color);
    glow2.addColorStop(1, 'transparent');
    ctx.fillStyle = glow2;
    ctx.beginPath(); ctx.arc(this.x, this.y, s * 3, 0, Math.PI * 2); ctx.fill();

    // 内核（白亮）
    const core = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s);
    core.addColorStop(0, '#ffffff');
    core.addColorStop(0.35, this.color);
    core.addColorStop(1, 'transparent');
    ctx.fillStyle = core;
    ctx.beginPath(); ctx.arc(this.x, this.y, s, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
  }
}

// ========================== 背景星星 ==============================
class BackgroundStar {
  constructor() {
    this.x = Math.random() * window.innerWidth;
    this.y = Math.random() * window.innerHeight;
    this.size = 0.3 + Math.random() * 0.8;
    this.alpha = 0.2 + Math.random() * 0.5;
    this.twinkleSpeed = 0.01 + Math.random() * 0.04;
    this.twinklePhase = Math.random() * Math.PI * 2;
  }

  update() {
    this.twinklePhase += this.twinkleSpeed;
    this.currentAlpha = this.alpha * (0.5 + 0.5 * Math.sin(this.twinklePhase));
  }

  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.currentAlpha;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ========================== 辅助函数 ============================

function dist(a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  return Math.sqrt(dx * dx + dy * dy);
}

// ========================== 手势识别 ============================

function isFingerExtended(tipIdx, mcpIdx, landmarks, wrist) {
  const tipDist = dist(landmarks[tipIdx], wrist);
  const mcpDist = dist(landmarks[mcpIdx], wrist);
  return tipDist > mcpDist * 1.12;
}

function detectGesture(landmarks) {
  const wrist = landmarks[0];
  const fingers = [
    { tip: 8,  mcp: 5 },
    { tip: 12, mcp: 9 },
    { tip: 16, mcp: 13 },
    { tip: 20, mcp: 17 },
  ];
  let extendedCount = 0;
  for (const f of fingers) {
    if (isFingerExtended(f.tip, f.mcp, landmarks, wrist)) extendedCount++;
  }
  if (extendedCount >= 3) return 'open';
  if (extendedCount <= 1) return 'fist';
  return 'none';
}

// ========================== 粒子系统初始化 ========================

function initParticles() {
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new Particle(i));
  }
}

function initBgStars() {
  bgStars = [];
  for (let i = 0; i < BG_STAR_COUNT; i++) {
    bgStars.push(new BackgroundStar());
  }
}

function setAllParticleTargets(mode) {
  const cx = W / 2;
  const cy = H / 2;
  for (const p of particles) {
    p.setTarget(mode, cx, cy);
  }
}

// ========================== 渲染循环 ============================

function drawConnections() {
  // 构建空间哈希表
  clearSpatialGrid();
  for (const p of particles) {
    addToGrid(p);
  }

  // 为每个粒子找邻居并连线
  for (const p of particles) {
    p.connections = [];
    const nearby = getNearby(p);

    // 按距离排序，取最近的几个
    const candidates = [];
    for (const other of nearby) {
      if (other === p) continue;
      const d = dist(p, other);
      if (d < CONNECT_MAX_DIST) {
        candidates.push({ particle: other, dist: d });
      }
    }
    candidates.sort((a, b) => a.dist - b.dist);
    p.connections = candidates.slice(0, CONNECT_MAX_LINES);
  }

  // 绘制连线（去重：只画 id 较小的到较大的）
  const drawn = new Set();
  ctx.save();
  for (const p of particles) {
    for (const conn of p.connections) {
      const other = conn.particle;
      const key = Math.min(p.id, other.id) + '_' + Math.max(p.id, other.id);
      if (drawn.has(key)) continue;
      drawn.add(key);

      // 距离越近线越亮
      const alpha = Math.max(0, 1 - conn.dist / CONNECT_MAX_DIST) * 0.35;
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(other.x, other.y);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawCenterRing() {
  const cx = W / 2, cy = H / 2;
  const pulse = Math.sin(time * 0.03) * 0.3 + 0.7; // 光环呼吸

  ctx.save();

  // 外层旋转光环
  const rotation = time * 0.005;
  ctx.globalAlpha = 0.12 * pulse;
  ctx.strokeStyle = '#00f0ff';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx, cy, BASE_RING_RADIUS + 20, rotation, rotation + Math.PI * 1.6);
  ctx.stroke();

  // 内层虚线环
  ctx.globalAlpha = 0.08 * pulse;
  ctx.setLineDash([8, 20]);
  ctx.lineDashOffset = time * 0.5;
  ctx.beginPath();
  ctx.arc(cx, cy, BASE_RING_RADIUS, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // 中心微光
  const centerGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40);
  centerGlow.addColorStop(0, 'rgba(255,255,255,0.06)');
  centerGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = centerGlow;
  ctx.beginPath(); ctx.arc(cx, cy, 40, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

function drawParticles() {
  // 背景覆盖（较低的 alpha 产生更长拖尾）
  ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
  ctx.fillRect(0, 0, W, H);

  // 先画背景星星
  for (const star of bgStars) {
    star.update();
    star.draw(ctx);
  }

  // 连线（在粒子之前画，让粒子覆盖在线上）
  drawConnections();

  // 中心光环
  drawCenterRing();

  // 画粒子
  for (const p of particles) {
    p.update();
    p.draw(ctx);
  }
}

function animate() {
  time++;
  drawParticles();
  requestAnimationFrame(animate);
}

// ========================== 摄像头 & MediaPipe =====================

async function setupCamera() {
  video = document.getElementById('cameraPreview');
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { width: 640, height: 480, facingMode: 'user' },
    audio: false,
  });
  video.srcObject = stream;
  await new Promise(resolve => { video.onloadedmetadata = resolve; });
  video.play();
}

async function setupMediaPipe() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
  );
  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU",
    },
    runningMode: "VIDEO",
    numHands: 1,
  });
  isModelLoaded = true;
  document.getElementById('loadingOverlay').style.opacity = '0';
}

function detectFrame() {
  if (!isModelLoaded || !video || video.readyState < 2) {
    requestAnimationFrame(detectFrame);
    return;
  }

  if (video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;
    const results = handLandmarker.detectForVideo(video, performance.now());

    if (results.landmarks && results.landmarks.length > 0) {
      const landmarks = results.landmarks[0];
      const gesture = detectGesture(landmarks);

      if (gesture === 'open' || gesture === 'fist') {
        gestureStable++;
        if (gestureStable >= 3) {
          updateGestureState(gesture);
          gestureStable = 3;
        }
      } else {
        gestureStable = Math.max(0, gestureStable - 1);
      }
    } else {
      gestureStable = Math.max(0, gestureStable - 1);
      if (gestureStable === 0 && lastGestureMode !== 'scatter') {
        updateGestureState('none');
      }
    }
  }

  requestAnimationFrame(detectFrame);
}

function updateGestureState(gesture) {
  if (gesture === 'open' && lastGestureMode !== 'scatter') {
    lastGestureMode = 'scatter';
    setAllParticleTargets('scatter');
  } else if (gesture === 'fist' && lastGestureMode !== 'gather') {
    lastGestureMode = 'gather';
    setAllParticleTargets('gather');
  } else if (gesture === 'none' && lastGestureMode !== 'scatter') {
    lastGestureMode = 'scatter';
    setAllParticleTargets('scatter');
  }
}

// ========================== 鼠标事件 ==============================

function onMouseMove(e) {
  mouseX = e.clientX;
  mouseY = e.clientY;
  mouseActive = true;
}

function onMouseLeave() {
  mouseActive = false;
}

// ========================== 响应式处理 ============================

function onResize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  if (lastGestureMode === 'scatter') {
    setAllParticleTargets('scatter');
  } else {
    setAllParticleTargets('gather');
  }
}

// ========================== 启动入口 ============================

async function main() {
  // 1. Canvas
  canvas = document.getElementById('particleCanvas');
  ctx = canvas.getContext('2d');
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;

  // 2. 粒子 & 背景星星
  initParticles();
  initBgStars();
  setAllParticleTargets('scatter');

  // 3. 渲染循环
  animate();

  // 4. 事件监听
  window.addEventListener('resize', onResize);
  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('mouseleave', onMouseLeave);

  // 5. 摄像头
  try { await setupCamera(); } catch (err) {
    console.warn('摄像头不可用：', err.message);
    document.getElementById('loadingOverlay').textContent = '⚠ 需要摄像头权限，请刷新并允许';
  }

  // 6. MediaPipe
  try { await setupMediaPipe(); detectFrame(); } catch (err) {
    console.error('MediaPipe 加载失败：', err);
    document.getElementById('loadingOverlay').textContent = '❌ 模型加载失败，请检查网络后刷新';
  }
}

main();
</script>

</body>
</html>
