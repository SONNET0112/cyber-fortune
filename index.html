<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>粒子手势控制 — 握拳聚拢 · 张手散开</title>
<style>
  /* ========== 全局重置 ========== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }

  /* ========== 粒子画布：铺满全屏 ========== */
  #particleCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  /* ========== 摄像头预览小窗 ========== */
  #cameraPreview {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 200px;
    height: 150px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.3);
    object-fit: cover;
    transform: scaleX(-1); /* 镜像翻转，方便对照手势 */
    z-index: 10;
    opacity: 0.8;
    transition: opacity 0.3s;
    background: #111;
  }

  /* ========== 状态提示文字 ========== */
  #statusBar {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    color: #fff;
    font-size: 1.3em;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-align: center;
    text-shadow: 0 0 20px rgba(0, 240, 255, 0.8);
    transition: all 0.5s;
  }

  /* 连接状态提示 */
  #loadingOverlay {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    color: #888;
    font-size: 0.95em;
    letter-spacing: 0.1em;
    text-align: center;
    transition: opacity 0.5s;
  }
</style>
</head>
<body>

<!-- 粒子画布 -->
<canvas id="particleCanvas"></canvas>

<!-- 摄像头预览（隐藏的 video 元素用于 MediaPipe 识别） -->
<video id="cameraPreview" autoplay playsinline></video>

<!-- 状态提示 -->
<div id="statusBar">🖐 等待手势识别…</div>
<div id="loadingOverlay">⏳ 正在加载手势识别模型…</div>

<!-- ==================== MediaPipe Hands CDN ==================== -->
<script type="module">
// ================================================================
//  引入 MediaPipe Tasks Vision 库（ESM 模块方式）
//  HandLandmarker：21 个手部关键点检测
//  FilesetResolver：加载 WASM 运行时
// ================================================================
import { HandLandmarker, FilesetResolver } from
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/+esm";

// ========================== 常量定义 ============================
const PARTICLE_COUNT = 1000;          // 粒子总数
const LERP_SPEED = 0.04;             // 线性插值速度（越大越快，越小越平滑）
const BASE_RING_RADIUS = 120;        // 聚拢时圆环的基础半径（像素）
const RING_THICKNESS = 60;           // 圆环厚度（半径随机偏移范围）
const FLOAT_AMPLITUDE = 30;          // 漂浮动画振幅
const MIN_PARTICLES = 800;           // 最小可见粒子数（性能预留）

// ========================== 全局变量 ============================
let canvas, ctx;
let particles = [];                  // 粒子数组
let video;
let handLandmarker;
let lastVideoTime = -1;              // 防止重复检测同一帧
let isModelLoaded = false;

// 手势状态
let currentGesture = 'none';         // 'open' | 'fist' | 'none'
let gestureStable = 0;              // 手势稳定计数器（防抖）

// 画布尺寸
let W, H;

// 鼠标交互（备用）
let mouseX = -1000, mouseY = -1000;

// ========================== 粒子类 ==============================
class Particle {
  constructor(id) {
    this.id = id;

    // —— 当前位置 ——
    this.x = Math.random() * window.innerWidth;
    this.y = Math.random() * window.innerHeight;

    // —— 目标位置（初始同当前位置） ——
    this.targetX = this.x;
    this.targetY = this.y;

    // —— 聚拢时的极坐标参数 ——
    // 角度：均匀分布 0 ~ 2π
    this.angle = (id / PARTICLE_COUNT) * Math.PI * 2;
    // 半径：基础半径 + 随机偏移（产生"光团"而非"死点"）
    this.orbitRadius = BASE_RING_RADIUS + (Math.random() - 0.5) * RING_THICKNESS;

    // —— 视觉属性 ——
    this.size = 0.8 + Math.random() * 2.5;       // 粒子半径
    this.baseSize = this.size;
    // 颜色：青→紫→白渐变池
    this.color = randomColor();
    this.alpha = 0.5 + Math.random() * 0.5;       // 透明度

    // —— 漂浮动画偏移 ——
    this.floatOffsetX = Math.random() * Math.PI * 2;
    this.floatOffsetY = Math.random() * Math.PI * 2;
    this.floatSpeedX = 0.002 + Math.random() * 0.006;
    this.floatSpeedY = 0.002 + Math.random() * 0.006;
  }

  /**
   * 更新目标位置
   * @param {string} mode - 'scatter' | 'gather'
   * @param {number} centerX - 聚拢中心 X
   * @param {number} centerY - 聚拢中心 Y
   */
  setTarget(mode, centerX, centerY) {
    if (mode === 'gather') {
      // ---- 聚拢：极坐标公式 x = r·cos(θ), y = r·sin(θ) ----
      this.targetX = centerX + this.orbitRadius * Math.cos(this.angle);
      this.targetY = centerY + this.orbitRadius * Math.sin(this.angle);
      this.size = this.baseSize * 1.3; // 聚拢时稍大，光团更明显
    } else {
      // ---- 散开：屏幕内随机位置 ----
      const margin = 60;
      this.targetX = margin + Math.random() * (W - margin * 2);
      this.targetY = margin + Math.random() * (H - margin * 2);
      this.size = this.baseSize;
    }
  }

  /**
   * 每帧更新：Lerp 插值 + 漂浮微动
   */
  update() {
    // —— 线性插值：向目标平滑过渡 ——
    this.x += (this.targetX - this.x) * LERP_SPEED;
    this.y += (this.targetY - this.y) * LERP_SPEED;

    // —— 叠加漂浮动画（正弦波微动） ——
    this.floatOffsetX += this.floatSpeedX;
    this.floatOffsetY += this.floatSpeedY;
    const floatX = Math.sin(this.floatOffsetX) * FLOAT_AMPLITUDE * 0.3;
    const floatY = Math.cos(this.floatOffsetY) * FLOAT_AMPLITUDE * 0.3;
    this.x += floatX;
    this.y += floatY;
  }

  /**
   * 绘制单个粒子（双层光晕，性能优于 shadowBlur）
   */
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.alpha;

    // 外层光晕：大而淡
    const outerGradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 4);
    outerGradient.addColorStop(0, this.color);
    outerGradient.addColorStop(1, 'transparent');
    ctx.fillStyle = outerGradient;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
    ctx.fill();

    // 内层核心：小而亮
    const innerGradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
    innerGradient.addColorStop(0, '#ffffff');
    innerGradient.addColorStop(0.4, this.color);
    innerGradient.addColorStop(1, 'transparent');
    ctx.fillStyle = innerGradient;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }
}

// ========================== 辅助函数 ============================

/** 从霓虹色池中随机选取颜色 */
function randomColor() {
  const colors = [
    '#00f0ff', // 青
    '#00d4ff', // 亮青
    '#b347ea', // 紫
    '#c77dff', // 淡紫
    '#ff6b9d', // 粉
    '#39ff14', // 绿
    '#ffd700', // 金
    '#ffffff', // 白
  ];
  return colors[Math.floor(Math.random() * colors.length)];
}

/** 计算两点距离 */
function dist(a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  return Math.sqrt(dx * dx + dy * dy);
}

// ========================== 手势识别 ============================

/**
 * 判断单根手指是否伸直
 * 原理：比较指尖到手腕的距离 与 指根(MCP)到手腕的距离
 *       如果指尖距离 > 指根距离，说明手指伸直
 *
 * @param {number} tipIdx   - 指尖关键点索引
 * @param {number} mcpIdx   - 指根关键点索引（MCP 关节）
 * @param {Array}  landmarks - 全部 21 个关键点 [{x, y, z}]
 * @param {Object} wrist     - 手腕关键点
 * @returns {boolean}
 */
function isFingerExtended(tipIdx, mcpIdx, landmarks, wrist) {
  const tipDist = dist(landmarks[tipIdx], wrist);
  const mcpDist = dist(landmarks[mcpIdx], wrist);
  // 指尖比指根远 12% 以上视为伸直
  return tipDist > mcpDist * 1.12;
}

/**
 * 根据 21 个关键点判断当前手势
 * 返回 'open'（张手）、'fist'（握拳）或 'none'（未识别）
 *
 * MediaPipe 手部关键点索引：
 *   0: 手腕
 *   1-4: 大拇指 (CMC→MCP→IP→TIP)
 *   5-8: 食指   (MCP→PIP→DIP→TIP)
 *   9-12: 中指  (MCP→PIP→DIP→TIP)
 *   13-16: 无名指(MCP→PIP→DIP→TIP)
 *   17-20: 小拇指(MCP→PIP→DIP→TIP)
 */
function detectGesture(landmarks) {
  const wrist = landmarks[0];

  // 检查 4 根手指（食指、中指、无名指、小拇指）
  // tip: 8, 12, 16, 20  |  mcp: 5, 9, 13, 17
  const fingers = [
    { tip: 8,  mcp: 5 },   // 食指
    { tip: 12, mcp: 9 },   // 中指
    { tip: 16, mcp: 13 },  // 无名指
    { tip: 20, mcp: 17 },  // 小拇指
  ];

  let extendedCount = 0;
  for (const f of fingers) {
    if (isFingerExtended(f.tip, f.mcp, landmarks, wrist)) {
      extendedCount++;
    }
  }

  // 判断逻辑：
  //   >= 3 根伸直 → "open"（张开手掌）
  //   <= 1 根伸直 → "fist"（握拳）
  if (extendedCount >= 3) return 'open';
  if (extendedCount <= 1) return 'fist';
  return 'none'; // 中间状态（如剪刀手）
}

// ========================== 粒子系统 ============================

/** 初始化/重建所有粒子 */
function initParticles() {
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new Particle(i));
  }
}

/** 设置所有粒子的目标状态 */
function setAllParticleTargets(mode) {
  const cx = W / 2;  // 屏幕中心 X
  const cy = H / 2;  // 屏幕中心 Y
  for (const p of particles) {
    p.setTarget(mode, cx, cy);
  }
}

// ========================== 渲染循环 ============================

/** 每帧绘制所有粒子 */
function drawParticles() {
  // 半透明背景覆盖，产生拖尾/残影效果
  ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
  ctx.fillRect(0, 0, W, H);

  for (const p of particles) {
    p.update();
    p.draw(ctx);
  }

  // 在中心画一个微弱的光环，指示聚拢位置
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = '#00f0ff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(W / 2, H / 2, BASE_RING_RADIUS, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

/** 主循环 */
function animate() {
  drawParticles();
  requestAnimationFrame(animate);
}

// ========================== 摄像头 & MediaPipe =====================

/**
 * 初始化摄像头
 */
async function setupCamera() {
  video = document.getElementById('cameraPreview');

  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      width: 640,
      height: 480,
      facingMode: 'user',  // 前置摄像头
    },
    audio: false,
  });

  video.srcObject = stream;
  // 等待视频元数据加载完成
  await new Promise(resolve => { video.onloadedmetadata = resolve; });
  video.play();
}

/**
 * 初始化 MediaPipe HandLandmarker
 */
async function setupMediaPipe() {
  // 加载 WASM 运行时
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
  );

  // 创建手势识别器
  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU",
    },
    runningMode: "VIDEO",
    numHands: 1, // 只检测一只手，节省性能
  });

  isModelLoaded = true;
  document.getElementById('loadingOverlay').style.opacity = '0';
}

/**
 * 每帧检测手势（由 requestAnimationFrame 驱动）
 */
let lastGestureMode = 'scatter'; // 上一次的手势模式

function detectFrame() {
  if (!isModelLoaded || !video || video.readyState < 2) {
    requestAnimationFrame(detectFrame);
    return;
  }

  // 避免对同一帧重复检测
  if (video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;

    const results = handLandmarker.detectForVideo(video, performance.now());

    if (results.landmarks && results.landmarks.length > 0) {
      // 取第一只手
      const landmarks = results.landmarks[0];
      const gesture = detectGesture(landmarks);

      // 防抖：手势需保持 3 帧才切换，避免抖动
      if (gesture === 'open' || gesture === 'fist') {
        gestureStable++;
        if (gestureStable >= 3) {
          updateGestureState(gesture);
          gestureStable = 3; // 防止溢出
        }
      } else {
        gestureStable = Math.max(0, gestureStable - 1);
      }
    } else {
      // 没有检测到手 → 慢慢回到散开状态
      gestureStable = Math.max(0, gestureStable - 1);
      if (gestureStable === 0 && lastGestureMode !== 'scatter') {
        updateGestureState('none');
      }
    }
  }

  requestAnimationFrame(detectFrame);
}

/**
 * 切换手势状态并更新粒子目标
 */
function updateGestureState(gesture) {
  const statusBar = document.getElementById('statusBar');

  if (gesture === 'open' && lastGestureMode !== 'scatter') {
    lastGestureMode = 'scatter';
    setAllParticleTargets('scatter');
    statusBar.innerHTML = '🖐 <span style="color:#39ff14;">张手 · 粒子散开</span>';
    statusBar.style.textShadow = '0 0 20px rgba(57, 255, 20, 0.8)';
  } else if (gesture === 'fist' && lastGestureMode !== 'gather') {
    lastGestureMode = 'gather';
    setAllParticleTargets('gather');
    statusBar.innerHTML = '✊ <span style="color:#ffd700;">握拳 · 粒子聚拢</span>';
    statusBar.style.textShadow = '0 0 20px rgba(255, 215, 0, 0.8)';
  } else if (gesture === 'none' && lastGestureMode !== 'scatter') {
    lastGestureMode = 'scatter';
    setAllParticleTargets('scatter');
    statusBar.innerHTML = '🖐 等待手势识别…';
    statusBar.style.textShadow = '0 0 20px rgba(0, 240, 255, 0.8)';
  }
}

// ========================== 响应式处理 ==========================

/** 窗口大小变化时更新画布尺寸并重新设定散开目标 */
function onResize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  // 窗口大小变了，重新设定所有粒子的目标
  if (lastGestureMode === 'scatter') {
    setAllParticleTargets('scatter');
  } else {
    setAllParticleTargets('gather');
  }
}

// ========================== 启动入口 ============================

async function main() {
  // 1. 获取 DOM 元素
  canvas = document.getElementById('particleCanvas');
  ctx = canvas.getContext('2d');
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;

  // 2. 初始化粒子
  initParticles();
  setAllParticleTargets('scatter'); // 初始散开

  // 3. 启动渲染循环
  animate();

  // 4. 监听窗口变化
  window.addEventListener('resize', onResize);

  // 5. 初始化摄像头
  try {
    await setupCamera();
  } catch (err) {
    console.warn('摄像头不可用，使用鼠标模拟：', err.message);
    document.getElementById('loadingOverlay').textContent =
      '⚠ 摄像头不可用，请允许摄像头权限后刷新页面';
  }

  // 6. 加载 MediaPipe 手势模型
  try {
    await setupMediaPipe();
    detectFrame(); // 开始手势检测
  } catch (err) {
    console.error('MediaPipe 加载失败：', err);
    document.getElementById('loadingOverlay').textContent =
      '❌ 模型加载失败，请检查网络连接后刷新';
  }
}

// 启动！
main();
</script>

</body>
</html>
