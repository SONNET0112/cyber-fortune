<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌊 海的思念 · 3D 粒子装置</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000510;
  }

  /* 摄像头预览小窗 */
  #cameraPreview {
    position: fixed;
    bottom: 24px; right: 24px;
    width: 180px; height: 135px;
    border-radius: 16px;
    border: 2px solid rgba(100, 160, 255, 0.3);
    object-fit: cover;
    transform: scaleX(-1);
    z-index: 10;
    opacity: 0.7;
    transition: opacity 0.4s;
    background: #000a1a;
    box-shadow: 0 0 20px rgba(60, 120, 255, 0.12);
  }
  #cameraPreview:hover { opacity: 1; }

  .cam-label {
    position: fixed;
    bottom: 164px; right: 24px;
    z-index: 11;
    color: rgba(120, 180, 255, 0.45);
    font-size: 0.65em;
    letter-spacing: 0.14em;
    font-weight: 600;
    pointer-events: none;
  }

  /* 底部氛围文字 */
  #moodText {
    position: fixed;
    bottom: 40px; left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    color: rgba(150, 200, 255, 0.4);
    font-size: 0.85em;
    letter-spacing: 0.2em;
    pointer-events: none;
    transition: all 1.5s;
    font-style: italic;
  }

  /* 加载提示 */
  #loadingOverlay {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    color: rgba(150, 190, 240, 0.7);
    font-size: 0.95em;
    letter-spacing: 0.12em;
    text-align: center;
    transition: opacity 0.6s;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- Three.js 渲染目标 -->
<div id="threeContainer"></div>

<video id="cameraPreview" autoplay playsinline></video>
<div class="cam-label">📷</div>

<div id="moodText">海 的 思 念</div>
<div id="loadingOverlay">🌊 正在加载…</div>

<!-- ==================== Import Maps ==================== -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
// ================================================================
//  🌊 海的思念 — 3D 粒子交互装置
//  手势控制：张手散开 / 握拳聚拢
//  手掌移动旋转视角 / 双手推拉缩放
//  默认形态：粒子缓缓聚成心形
// ================================================================

import * as THREE from 'three';
import { HandLandmarker, FilesetResolver } from
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/+esm";

// ========================== 常量 ============================
const PARTICLE_COUNT = 1800;        // 主粒子数
const LERP_SPEED = 0.045;           // 位置插值速度
const ROTATION_LERP = 0.06;         // 旋转平滑速度
const SCALE_LERP = 0.05;            // 缩放平滑速度

// ========================== Three.js 全局变量 ===================
let scene, camera, renderer;
let particleGroup;                  // 粒子组的父级（用于旋转/缩放）
let particleSystem;                 // THREE.Points
let particleTexture;
let currentPositions, targetPositions; // Float32Array
let geometry;

// ========================== 粒子数据 ========================
let particleColors;                 // 每个粒子的颜色（Float32Array）
let particleBaseSizes;              // 每个粒子的基础大小

// ========================== 状态 ============================
let lastGestureMode = 'heart';      // 'heart' | 'scatter' | 'gather'
let gestureStable = 0;
let targetRotationY = 0;
let targetScale = 1.0;
let prevHandX = 0.5;               // 上一帧手 X 坐标
let twoHandBaseDist = null;         // 双手基线距离
let time = 0;

// 摄像头/MediaPipe
let video;
let handLandmarker;
let isModelLoaded = false;
let lastVideoTime = -1;

// ========================== 心形生成器 ========================

/**
 * 生成心形曲线上的 3D 坐标
 * 使用参数方程：x = 16sin³(t), y = 13cos(t)-5cos(2t)-2cos(3t)-cos(4t)
 * 并通过随机缩放填充心形内部
 */
function generateHeartTarget(i) {
  const t = (i / PARTICLE_COUNT) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
  // 填充因子：0=中心, 1=轮廓（用 sqrt 让中心更密集）
  const fill = Math.sqrt(Math.random());
  const rx = fill * 16 * Math.pow(Math.sin(t), 3);
  const ry = fill * (13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
  // 缩放到合适大小，并微调 Y 轴让心形居中
  const scale = 0.13;
  return {
    x: rx * scale,
    y: ry * scale + 0.3,
    z: (Math.random() - 0.5) * 1.2 * fill
  };
}

/** 生成球体目标（握拳聚拢） */
function generateSphereTarget() {
  const phi = Math.acos(2 * Math.random() - 1);
  const theta = Math.random() * Math.PI * 2;
  const r = 1.2 + (Math.random() - 0.5) * 0.4;
  return {
    x: r * Math.sin(phi) * Math.cos(theta),
    y: r * Math.sin(phi) * Math.sin(theta),
    z: r * Math.cos(phi)
  };
}

/** 生成散开目标（大范围随机球体） */
function generateScatterTarget() {
  const phi = Math.acos(2 * Math.random() - 1);
  const theta = Math.random() * Math.PI * 2;
  const r = 3.5 + Math.random() * 6;
  return {
    x: r * Math.sin(phi) * Math.cos(theta),
    y: r * Math.sin(phi) * Math.sin(theta),
    z: r * Math.cos(phi)
  };
}

// ========================== 粒子纹理（发光圆点）=================

function createGlowTexture() {
  const size = 128;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');

  // 多层渐变模拟柔光
  const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  g.addColorStop(0,    'rgba(255,255,255,1)');
  g.addColorStop(0.02, 'rgba(220,235,255,0.95)');
  g.addColorStop(0.08, 'rgba(150,200,255,0.7)');
  g.addColorStop(0.2,  'rgba(80, 140, 240,0.35)');
  g.addColorStop(0.5,  'rgba(20, 50,  140,0.05)');
  g.addColorStop(1,    'rgba(0, 0,   30, 0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);

  const tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  return tex;
}

// ========================== Three.js 初始化 ====================

function setupThreeJS() {
  const W = window.innerWidth;
  const H = window.innerHeight;

  // 渲染器
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  // 场景：深海夜色
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000a1a);
  scene.fog = new THREE.FogExp2(0x000a1a, 0.00025);

  // 相机
  camera = new THREE.PerspectiveCamera(55, W / H, 0.5, 50);
  camera.position.set(0, 0.6, 7.5);
  camera.lookAt(0, 0.2, 0);

  // 粒子纹理
  particleTexture = createGlowTexture();

  // 粒子几何体
  geometry = new THREE.BufferGeometry();
  currentPositions = new Float32Array(PARTICLE_COUNT * 3);
  targetPositions = new Float32Array(PARTICLE_COUNT * 3);
  particleColors = new Float32Array(PARTICLE_COUNT * 3);

  // 初始化位置和颜色
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const heart = generateHeartTarget(i);
    const i3 = i * 3;
    // 初始散布在空间中
    currentPositions[i3] = (Math.random() - 0.5) * 6;
    currentPositions[i3+1] = (Math.random() - 0.5) * 6;
    currentPositions[i3+2] = (Math.random() - 0.5) * 6;
    targetPositions[i3] = heart.x;
    targetPositions[i3+1] = heart.y;
    targetPositions[i3+2] = heart.z;

    // 蓝白色系
    const blueMix = 0.4 + Math.random() * 0.6;
    particleColors[i3] = 0.35 * blueMix;       // R
    particleColors[i3+1] = 0.55 * blueMix;     // G
    particleColors[i3+2] = 0.6 + 0.4 * blueMix; // B
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

  // 粒子材质
  const material = new THREE.PointsMaterial({
    size: 0.18,
    map: particleTexture,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    depthTest: true,
    transparent: true,
    opacity: 0.85,
    vertexColors: true,
  });

  // 创建粒子系统
  particleSystem = new THREE.Points(geometry, material);

  // 父级 Group（用于旋转和缩放）
  particleGroup = new THREE.Group();
  particleGroup.add(particleSystem);
  scene.add(particleGroup);

  // —— 环境微光粒子（深度感） ——
  createAmbientParticles();
}

/** 创建漂浮的背景光点，增加空间深度 */
function createAmbientParticles() {
  const count = 300;
  const ambientGeo = new THREE.BufferGeometry();
  const ambientPos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    ambientPos[i*3] = (Math.random() - 0.5) * 15;
    ambientPos[i*3+1] = (Math.random() - 0.5) * 10;
    ambientPos[i*3+2] = -2 - Math.random() * 8;
  }
  ambientGeo.setAttribute('position', new THREE.BufferAttribute(ambientPos, 3));
  const ambientMat = new THREE.PointsMaterial({
    size: 0.06,
    map: particleTexture,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
    opacity: 0.4,
    color: new THREE.Color(0x4488cc),
  });
  const ambientPts = new THREE.Points(ambientGeo, ambientMat);
  scene.add(ambientPts);

  // 存储引用用于动画
  window._ambientParticles = { points: ambientPts, positions: ambientPos };
}

// ========================== 粒子目标更新 =======================

function setAllTargets(mode) {
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    let target;
    if (mode === 'heart')   target = generateHeartTarget(i);
    else if (mode === 'gather') target = generateSphereTarget();
    else                    target = generateScatterTarget();

    const i3 = i * 3;
    targetPositions[i3]   = target.x;
    targetPositions[i3+1] = target.y;
    targetPositions[i3+2] = target.z;
  }
}

// ========================== 动画循环 ============================

function updateParticles() {
  const posArr = geometry.attributes.position.array;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const i3 = i * 3;
    // Lerp 向目标位置过渡
    posArr[i3]   += (targetPositions[i3]   - posArr[i3])   * LERP_SPEED;
    posArr[i3+1] += (targetPositions[i3+1] - posArr[i3+1]) * LERP_SPEED;
    posArr[i3+2] += (targetPositions[i3+2] - posArr[i3+2]) * LERP_SPEED;
  }
  geometry.attributes.position.needsUpdate = true;
}

function animate() {
  requestAnimationFrame(animate);
  time++;

  // 更新粒子位置
  updateParticles();

  // 平滑旋转
  particleGroup.rotation.y += (targetRotationY - particleGroup.rotation.y) * ROTATION_LERP;

  // 平滑缩放
  const currentScale = particleGroup.scale.x;
  const newScale = currentScale + (targetScale - currentScale) * SCALE_LERP;
  particleGroup.scale.setScalar(newScale);

  // 粒子大小随呼吸感微调
  const breathe = 1 + Math.sin(time * 0.015) * 0.06;
  particleSystem.material.size = 0.18 * breathe;

  // 环境光点浮动
  if (window._ambientParticles) {
    const amb = window._ambientParticles;
    const ap = amb.positions;
    for (let i = 0; i < ap.length / 3; i++) {
      ap[i*3+1] += Math.sin(time * 0.01 + i) * 0.003;
      ap[i*3]   += Math.cos(time * 0.008 + i) * 0.002;
    }
    amb.points.geometry.attributes.position.needsUpdate = true;
  }

  // 氛围文字随状态变化
  const moodEl = document.getElementById('moodText');
  if (lastGestureMode === 'heart') {
    moodEl.textContent = '海 的 思 念';
    moodEl.style.color = 'rgba(150,200,255,0.4)';
  } else if (lastGestureMode === 'scatter') {
    moodEl.textContent = '散 落 星 河';
    moodEl.style.color = 'rgba(180,210,255,0.5)';
  } else {
    moodEl.textContent = '久 别 重 逢';
    moodEl.style.color = 'rgba(200,220,255,0.55)';
  }

  renderer.render(scene, camera);
}

// ========================== 手势识别 (MediaPipe) ===============

function isFingerExtended(tipIdx, mcpIdx, landmarks, wrist) {
  const tipDist = Math.hypot(landmarks[tipIdx].x - wrist.x, landmarks[tipIdx].y - wrist.y);
  const mcpDist = Math.hypot(landmarks[mcpIdx].x - wrist.x, landmarks[mcpIdx].y - wrist.y);
  return tipDist > mcpDist * 1.12;
}

function detectGesture(landmarks) {
  const wrist = landmarks[0];
  const fingers = [
    { tip: 8,  mcp: 5 },
    { tip: 12, mcp: 9 },
    { tip: 16, mcp: 13 },
    { tip: 20, mcp: 17 },
  ];
  let ext = 0;
  for (const f of fingers) {
    if (isFingerExtended(f.tip, f.mcp, landmarks, wrist)) ext++;
  }
  if (ext >= 3) return 'open';
  if (ext <= 1) return 'fist';
  return 'none';
}

// ========================== 摄像头 & MediaPipe ==================

async function setupCamera() {
  video = document.getElementById('cameraPreview');
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { width: 640, height: 480, facingMode: 'user' },
    audio: false,
  });
  video.srcObject = stream;
  await new Promise(r => { video.onloadedmetadata = r; });
  video.play();
}

async function setupMediaPipe() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
  );
  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU",
    },
    runningMode: "VIDEO",
    numHands: 2, // 检测双手
  });
  isModelLoaded = true;
  document.getElementById('loadingOverlay').style.opacity = '0';
}

// ========================== 手势检测循环 =======================

function detectFrame() {
  if (!isModelLoaded || !video || video.readyState < 2) {
    requestAnimationFrame(detectFrame);
    return;
  }

  if (video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;
    const results = handLandmarker.detectForVideo(video, performance.now());

    if (results.landmarks && results.landmarks.length > 0) {
      const hand0 = results.landmarks[0];
      const gesture = detectGesture(hand0);

      // —— 1. 手势类型（张手/握拳） ——
      if (gesture === 'open' || gesture === 'fist') {
        gestureStable++;
        if (gestureStable >= 3) {
          applyGestureMode(gesture);
          gestureStable = 3;
        }
      } else {
        gestureStable = Math.max(0, gestureStable - 1);
      }

      // —— 2. 手掌左右移动 → 旋转 ——
      // 手在画面左侧→左旋，右侧→右旋。取手腕 x 坐标
      const handX = hand0[0].x; // 0=左, 1=右
      // 映射到旋转角度 [-0.8, 0.8] 弧度
      targetRotationY = (handX - 0.5) * 1.6;
      prevHandX = handX;

      // —— 3. 双手推拉 → 缩放 ——
      if (results.landmarks.length >= 2) {
        const hand1 = results.landmarks[1];
        const h0x = hand0[0].x, h0y = hand0[0].y;
        const h1x = hand1[0].x, h1y = hand1[0].y;
        const dist = Math.hypot(h1x - h0x, h1y - h0y);

        // 基线：首次检测到双手时记录
        if (twoHandBaseDist === null) twoHandBaseDist = dist;

        // 相对变化映射到缩放 [0.4, 2.5]
        const ratio = dist / (twoHandBaseDist || 0.3);
        targetScale = Math.max(0.4, Math.min(2.5, ratio));
      } else {
        // 单手时慢慢回 1.0
        twoHandBaseDist = null;
        targetScale += (1.0 - targetScale) * 0.02;
      }
    } else {
      // —— 无手 → 回到心形 ——
      gestureStable = Math.max(0, gestureStable - 1);
      if (gestureStable === 0 && lastGestureMode !== 'heart') {
        applyGestureMode('heart');
      }
      twoHandBaseDist = null;
      targetRotationY += (0 - targetRotationY) * 0.02;
      targetScale += (1.0 - targetScale) * 0.02;
    }
  }

  requestAnimationFrame(detectFrame);
}

/**
 * 切换手势模式并生成新的目标位置
 */
function applyGestureMode(gesture) {
  let mode;
  if (gesture === 'open')  mode = 'scatter';
  else if (gesture === 'fist') mode = 'gather';
  else                     mode = 'heart';

  if (mode !== lastGestureMode) {
    lastGestureMode = mode;
    setAllTargets(mode);
  }
}

// ========================== 响应式 ==============================

function onResize() {
  const W = window.innerWidth, H = window.innerHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
}

// ========================== 启动 ================================

async function main() {
  // 1. Three.js
  setupThreeJS();

  // 2. 初始目标：心形
  setAllTargets('heart');

  // 3. 渲染循环
  animate();

  // 4. 事件
  window.addEventListener('resize', onResize);

  // 5. 摄像头
  try { await setupCamera(); } catch (e) {
    console.warn('摄像头不可用：', e.message);
    document.getElementById('loadingOverlay').textContent = '⚠ 需要摄像头权限';
  }

  // 6. MediaPipe
  try { await setupMediaPipe(); detectFrame(); } catch (e) {
    console.error('MediaPipe 加载失败：', e);
    document.getElementById('loadingOverlay').textContent = '❌ 模型加载失败，请检查网络';
  }
}

main();
</script>

</body>
</html>
