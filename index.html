<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ 神经粒子交互矩阵 Neural Particle Matrix</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; cursor: none; }
  #cameraPreview {
    position: fixed; bottom: 24px; right: 24px;
    width: 180px; height: 135px; border-radius: 16px;
    border: 1px solid rgba(0,240,255,0.2);
    object-fit: cover; transform: scaleX(-1); z-index: 10;
    opacity: 0.6; background: #000;
  }
  #loading {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 20; color: rgba(0,240,255,0.55); font-size: 0.85em;
    letter-spacing: 0.2em; pointer-events: none; transition: opacity 0.5s;
  }
</style>
</head>
<body>

<video id="cameraPreview" autoplay playsinline></video>
<div id="loading">◈ 神 经 链 接</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
// ================================================================
//  ⚡ 神经粒子交互矩阵 — Neural Particle Matrix
//  拖尾残影 · 指尖斥力 · 掌心引力 · 深度场 · Glitch撕裂
// ================================================================
import * as THREE from 'three';
import { HandLandmarker, FilesetResolver } from
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/+esm";

// ===================== 常量 =====================
const N = 1200;                     // 粒子数
const REPEL = 0.22;                 // 指尖斥力
const ATTRACT = 0.07;              // 掌心引力
const DAMPING = 0.935;             // 速度阻尼
const TRAIL_OPACITY = 0.12;        // 拖尾暗化量（越大拖尾越短）
const GLITCH_THRESH = 0.06;        // Glitch 触发手速
const Z_SPREAD = 4;                // Z 轴范围

// ===================== 全局变量 =====================
let scene, camera, renderer, orthoCam;
let rt, fadeQuad, displayQuad;
let particleSystem;
let geo, posArr, velArr, colArr, sizeArr;
let W, H, time = 0;
let video, handLandmarker, loaded = false, lastVidTime = -1;
let gesture = 'none', gestureStable = 0;
let fingertips = [];               // 指尖 3D 坐标
let palm = { x: 0, y: 0, z: 0 };
let prevPx = 0.5, prevPy = 0.5;
let handSpeed = 0;
let ringMesh;

// ===================== 粒子纹理 =====================
function makeTexture(r1,g1,b1, r2,g2,b2) {
  const sz = 128, c = document.createElement('canvas');
  c.width = sz; c.height = sz;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(sz/2, sz/2, 0, sz/2, sz/2, sz/2);
  g.addColorStop(0,    'rgba(255,255,255,1)');
  g.addColorStop(0.04, `rgba(${r1},${g1},${b1},0.9)`);
  g.addColorStop(0.18, `rgba(${r2},${g2},${b2},0.5)`);
  g.addColorStop(0.5,  'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, sz, sz);
  const t = new THREE.CanvasTexture(c);
  t.needsUpdate = true;
  return t;
}

// ===================== Three.js 初始化 =====================
function setupThree() {
  W = window.innerWidth; H = window.innerHeight;

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  camera = new THREE.PerspectiveCamera(55, W / H, 0.5, 30);
  camera.position.set(0, 0.2, 7);
  camera.lookAt(0, 0, 0);

  orthoCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

  // 拖尾渲染目标
  rt = new THREE.WebGLRenderTarget(W, H, {
    minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter, format: THREE.RGBAFormat
  });

  // 暗化四边形（覆盖上一帧以产生拖尾）
  const fadeMat = new THREE.MeshBasicMaterial({
    color: 0x000000, transparent: true, opacity: TRAIL_OPACITY,
    depthTest: false, depthWrite: false,
  });
  fadeQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), fadeMat);
  const fadeScene = new THREE.Scene();
  fadeScene.add(fadeQuad);
  window._fadeScene = fadeScene;

  // 显示四边形（将 rt 纹理拷贝到屏幕）
  const dispMat = new THREE.ShaderMaterial({
    uniforms: { tDiffuse: { value: rt.texture } },
    vertexShader: 'varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }',
    fragmentShader: 'varying vec2 vUv; uniform sampler2D tDiffuse; void main() { gl_FragColor = texture(tDiffuse, vUv); }',
    depthTest: false, depthWrite: false,
  });
  displayQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), dispMat);
  const dispScene = new THREE.Scene();
  dispScene.add(displayQuad);
  window._dispScene = dispScene;

  // —— 粒子系统（中性白色光晕纹理，颜色由 vertexColors 控制） ——
  const texGlow = makeTexture(255,255,255, 180,200,255);

  geo = new THREE.BufferGeometry();
  posArr  = new Float32Array(N * 3);
  velArr  = new Float32Array(N * 3);
  colArr  = new Float32Array(N * 3);
  sizeArr = new Float32Array(N);

  for (let i = 0; i < N; i++) {
    const i3 = i * 3;
    posArr[i3]   = (Math.random() - 0.5) * 8;
    posArr[i3+1] = (Math.random() - 0.5) * 6;
    posArr[i3+2] = (Math.random() - 0.5) * Z_SPREAD * 2;
    velArr[i3] = velArr[i3+1] = velArr[i3+2] = 0;

    const cyan = Math.random() > 0.5;
    colArr[i3]   = cyan ? 0.0 : 1.0;
    colArr[i3+1] = cyan ? 0.9 : 0.1;
    colArr[i3+2] = cyan ? 1.0 : 0.7;
    sizeArr[i] = 0.03 + Math.random() * 0.08; // PointsMaterial 的 size 是屏幕空间单位
  }

  geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(colArr, 3));

  // 使用 PointsMaterial：Three.js 原生支持 vertexColors + sizeAttenuation
  const mat = new THREE.PointsMaterial({
    size: 0.25,
    map: texGlow,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    depthTest: true,
    transparent: true,
    vertexColors: true,
    sizeAttenuation: true,  // 近大远小 ← 自动景深
  });

  particleSystem = new THREE.Points(geo, mat);
  scene.add(particleSystem);

  // —— 暗紫色环境光环 ——
  const ringGeo = new THREE.TorusGeometry(3, 0.01, 16, 120);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x220033, transparent: true, opacity: 0.3 });
  ringMesh = new THREE.Mesh(ringGeo, ringMat);
  ringMesh.rotation.x = Math.PI / 2.2;
  scene.add(ringMesh);

  // —— 场景中心微光 ——
  const glowGeo = new THREE.SphereGeometry(0.3, 32, 32);
  const glowMat = new THREE.MeshBasicMaterial({ color: 0x110022, transparent: true, opacity: 0.5 });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  scene.add(glow);
  window._centerGlow = glow;
}

// ===================== 物理模拟 =====================
function updatePhysics() {
  const dt = 0.016;
  const pos = posArr, vel = velArr;

  for (let i = 0; i < N; i++) {
    const i3 = i * 3;
    let fx = 0, fy = 0, fz = 0;

    if (gesture === 'open' && fingertips.length > 0) {
      // 指尖斥力：力 ∝ 1/r²
      for (const ft of fingertips) {
        const dx = pos[i3] - ft.x;
        const dy = pos[i3+1] - ft.y;
        const dz = pos[i3+2] - ft.z;
        const d2 = dx*dx + dy*dy + dz*dz + 0.005;
        const d = Math.sqrt(d2);
        if (d < 5) {
          const f = REPEL / d2;
          fx += (dx / d) * f;
          fy += (dy / d) * f;
          fz += (dz / d) * f * 0.3;
        }
      }
    } else if (gesture === 'fist') {
      // 掌心引力
      const dx = palm.x - pos[i3];
      const dy = palm.y - pos[i3+1];
      const dz = palm.z - pos[i3+2];
      const d = Math.sqrt(dx*dx + dy*dy + dz*dz) + 0.02;
      fx += dx * ATTRACT;
      fy += dy * ATTRACT;
      fz += dz * ATTRACT * 0.5;
      // 靠近中心时额外阻尼避免穿透
      if (d < 0.5) {
        const extraDrag = (0.5 - d) * 0.3;
        fx -= vel[i3] * extraDrag;
        fy -= vel[i3+1] * extraDrag;
        fz -= vel[i3+2] * extraDrag;
      }
    } else {
      // 无手势：微弱向心回归
      fx += -pos[i3] * 0.003;
      fy += -pos[i3+1] * 0.003;
      fz += -pos[i3+2] * 0.001;
    }

    // 更新速度
    vel[i3]   += fx * dt;
    vel[i3+1] += fy * dt;
    vel[i3+2] += fz * dt;

    // Glitch：高速时随机抖
    if (handSpeed > GLITCH_THRESH) {
      const gi = (handSpeed - GLITCH_THRESH) * 40;
      vel[i3]   += (Math.random() - 0.5) * gi * 0.015;
      vel[i3+1] += (Math.random() - 0.5) * gi * 0.015;
    }

    // 阻尼
    vel[i3]   *= DAMPING;
    vel[i3+1] *= DAMPING;
    vel[i3+2] *= DAMPING;

    // 更新位置
    pos[i3]   += vel[i3]   * dt;
    pos[i3+1] += vel[i3+1] * dt;
    pos[i3+2] += vel[i3+2] * dt;

    // Z 轴居中拉力
    pos[i3+2] += -pos[i3+2] * 0.003;

    // 软边界
    const b = 6;
    for (let j = 0; j < 3; j++) {
      const v = pos[i3 + j];
      if      (v > b)  { pos[i3+j] = b;  vel[i3+j] *= -0.3; }
      else if (v < -b) { pos[i3+j] = -b; vel[i3+j] *= -0.3; }
    }
  }
  geo.attributes.position.needsUpdate = true;

  // 颜色：高速→偏白
  const shift = Math.min(1, handSpeed * 10);
  for (let i = 0; i < N; i++) {
    const i3 = i * 3;
    const spd = Math.sqrt(vel[i3]*vel[i3] + vel[i3+1]*vel[i3+1] + vel[i3+2]*vel[i3+2]);
    const s = Math.max(shift, Math.min(1, spd * 4));
    const cyan = colArr[i3] < 0.5;
    colArr[i3]   = THREE.MathUtils.lerp(cyan ? 0.0 : 1.0, 1.0, s);
    colArr[i3+1] = THREE.MathUtils.lerp(cyan ? 0.9 : 0.1, 1.0, s);
    colArr[i3+2] = THREE.MathUtils.lerp(cyan ? 1.0 : 0.7, 1.0, s);
  }
  geo.attributes.color.needsUpdate = true;
}

// ===================== 渲染循环 =====================
function animate() {
  requestAnimationFrame(animate);
  time++;

  updatePhysics();

  // 拖尾：暗化度随手速调整
  fadeQuad.material.opacity = TRAIL_OPACITY + handSpeed * 0.35;

  // 环境光环随手速呼吸
  const p = 1 + handSpeed * 4;
  ringMesh.scale.setScalar(p);
  ringMesh.material.opacity = 0.2 + handSpeed * 2;
  window._centerGlow.material.opacity = 0.3 + handSpeed * 3;

  // ———— 拖尾渲染管线 ————
  // Step 1: 在 rt 上绘制暗化四边形（让上一帧变暗 = 拖尾）
  renderer.setRenderTarget(rt);
  renderer.render(window._fadeScene, orthoCam);
  // Step 2: 叠加当前粒子
  renderer.render(scene, camera);
  // Step 3: 拷贝到屏幕
  renderer.setRenderTarget(null);
  renderer.render(window._dispScene, orthoCam);
}

// ===================== 手势识别 =====================
function isExt(tip, mcp, lm, w) {
  const td = Math.hypot(lm[tip].x-w.x, lm[tip].y-w.y);
  const md = Math.hypot(lm[mcp].x-w.x, lm[mcp].y-w.y);
  return td > md * 1.12;
}
function detectG(lm) {
  const w = lm[0];
  const ff = [[8,5],[12,9],[16,13],[20,17]];
  let e = 0; for (const [t,m] of ff) if (isExt(t,m,lm,w)) e++;
  if (e >= 3) return 'open';
  if (e <= 1) return 'fist';
  return 'none';
}
function to3D(lm) {
  return { x: (lm.x-0.5)*10, y: -(lm.y-0.5)*7, z: (lm.z||0)*4-1 };
}

// ===================== 摄像头 & MediaPipe =====================
async function setupCam() {
  video = document.getElementById('cameraPreview');
  const s = await navigator.mediaDevices.getUserMedia({
    video: { width: 640, height: 480, facingMode: 'user' }, audio: false
  });
  video.srcObject = s;
  await new Promise(r => { video.onloadedmetadata = r; });
  video.play();
}
async function setupMP() {
  const v = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm");
  handLandmarker = await HandLandmarker.createFromOptions(v, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU",
    },
    runningMode: "VIDEO", numHands: 1,
  });
  loaded = true;
  document.getElementById('loading').style.opacity = '0';
}

function detectFrame() {
  if (!loaded || !video || video.readyState < 2) { requestAnimationFrame(detectFrame); return; }
  if (video.currentTime !== lastVidTime) {
    lastVidTime = video.currentTime;
    const res = handLandmarker.detectForVideo(video, performance.now());
    if (res.landmarks && res.landmarks.length > 0) {
      const lm = res.landmarks[0];
      const g = detectG(lm);
      if (g === 'open' || g === 'fist') { gestureStable++; if (gestureStable >= 3) { gesture = g; gestureStable = 3; } }
      else { gestureStable = Math.max(0, gestureStable-1); }

      fingertips = [4,8,12,16,20].map(i => to3D(lm[i]));
      palm = to3D(lm[9]);
      handSpeed = Math.hypot(lm[9].x-prevPx, lm[9].y-prevPy);
      prevPx = lm[9].x; prevPy = lm[9].y;

      camera.position.x += (Math.sin((lm[9].x-0.5)*0.6) * 7 - camera.position.x) * 0.03;
      camera.lookAt(0, 0, 0);
    } else {
      gestureStable = Math.max(0, gestureStable-1);
      if (gestureStable === 0) gesture = 'none';
      fingertips = [];
      handSpeed *= 0.9;
    }
  }
  requestAnimationFrame(detectFrame);
}

// ===================== 响应式 =====================
function onResize() {
  W = window.innerWidth; H = window.innerHeight;
  camera.aspect = W / H; camera.updateProjectionMatrix();
  renderer.setSize(W, H); rt.setSize(W, H);
}

// ===================== 启动 =====================
async function main() {
  setupThree();
  animate();
  window.addEventListener('resize', onResize);
  try { await setupCam(); } catch(e) { document.getElementById('loading').textContent = '⚠ 需要摄像头'; }
  try { await setupMP(); detectFrame(); } catch(e) { document.getElementById('loading').textContent = '❌ 模型加载失败'; }
}
main();
</script>
</body>
</html>
